<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperture AI-Gateway</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>APERTURE <span>v1.0</span></h1>
                <p>Quantum Pricing DePIN Gateway</p>
            </div>
            <div class="wallet-panel">
                <div class="balance-box">
                    <span class="label">Balance:</span>
                    <span id="balance-display">Loading...</span> <span class="currency">USDC</span>
                    <div id="demo-badge" class="badge hidden">DEMO MODE</div>
                </div>
                <button id="connect-wallet-btn" class="btn outline">Connect Wallet</button>
            </div>
        </header>

        <main>
            <div class="editor-section">
                <div class="section-header">
                    <h2>Target Payload (Python)</h2>
                    <span class="status-dot green"></span>
                </div>
                <textarea id="code-input" spellcheck="false">
# Write your Python payload here
import numpy as np

for i in range(100):
    print("Aperture is running")
                </textarea>
                <button id="execute-btn" class="btn primary">Deploy & Execute</button>
            </div>

            <div class="terminal-section">
                <div class="section-header">
                    <h2>Gateway Terminal</h2>
                </div>
                <div id="terminal-output" class="terminal-content">
                    <div class="log system">> System initialized. Waiting for payload...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="wallet-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Select Solana Wallet</h3>
            <div id="wallet-list" class="wallet-list">
                </div>
            <button id="close-modal-btn" class="btn outline" style="margin-top: 15px; width: 100%;">Cancel</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
