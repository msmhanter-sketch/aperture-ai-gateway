<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperture AI-Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Анимация пульсации для сканирования ИИ */
        .ai-scanning { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
            50% { border-color: #60a5fa; box-shadow: 0 0 20px #60a5fa; }
            100% { border-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans h-screen flex flex-col selection:bg-green-500 selection:text-black">

    <header class="bg-gray-900 border-b border-green-500/50 p-5 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-2xl font-bold tracking-wider flex items-center gap-3">
                <span class="text-green-500 text-3xl">⚙️ Aperture</span> 
                <span>AI-GATEWAY</span>
            </h1>
            <p class="text-gray-400 text-sm tracking-widest mt-1 uppercase">Dynamic Compute Monetization on Solana</p>
        </div>
        <div class="flex gap-4 text-sm font-mono bg-gray-800 p-2 rounded border border-gray-700">
            <div><span class="text-gray-500">Network:</span> <span class="text-green-400">Devnet</span></div>
            <div><span class="text-gray-500">Ping:</span> <span class="text-blue-400">400ms</span></div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-8 p-8 max-w-7xl mx-auto w-full">
        
        <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 flex flex-col gap-5 shadow-2xl relative">
            <div class="absolute -top-3 left-6 bg-gray-950 px-3 text-sm font-bold tracking-widest text-gray-400">CLIENT PAYLOAD</div>
            
            <div class="flex justify-between items-center mt-2">
                <p class="text-xs text-gray-500 uppercase">Inject Compute Task:</p>
                <div class="flex gap-3">
                    <button onclick="setTemplate('light')" class="bg-gray-800 hover:bg-gray-700 border border-gray-600 px-4 py-1.5 rounded text-xs font-bold text-blue-400 transition">O(1) Light Task</button>
                    <button onclick="setTemplate('heavy')" class="bg-gray-800 hover:bg-gray-700 border border-gray-600 px-4 py-1.5 rounded text-xs font-bold text-red-400 transition">O(n²) Heavy Task</button>
                </div>
            </div>

            <textarea id="payloadInput" class="w-full h-64 bg-gray-950 border border-gray-700 rounded-lg p-5 font-mono text-sm text-green-400 focus:outline-none transition-all duration-300 placeholder-gray-600 leading-relaxed" placeholder="// Awaiting python or rust payload..."></textarea>
            
            <button onclick="sendRequest()" id="sendBtn" class="bg-green-600 hover:bg-green-500 text-black py-4 rounded-lg font-bold text-lg transition-all uppercase tracking-[0.2em] mt-auto shadow-[0_0_15px_rgba(34,197,94,0.3)] hover:shadow-[0_0_25px_rgba(34,197,94,0.6)]">
                Initialize Compute Stream
            </button>
        </div>

        <div class="flex flex-col gap-8">
            
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-2xl relative overflow-hidden group">
                <div class="absolute -top-3 left-6 bg-gray-950 px-3 text-sm font-bold tracking-widest text-gray-400">ON-CHAIN STATE</div>
                
                <div class="flex justify-between items-end mt-4">
                    <div>
                        <p class="text-xs text-gray-500 uppercase mb-1 font-bold">Dynamic Burn Rate</p>
                        <div class="text-6xl font-mono font-black tracking-tighter flex items-baseline gap-2">
                            <span id="burnRateDisplay" class="text-green-500 transition-colors duration-500">0.00</span>
                            <span class="text-xl text-gray-600 font-sans font-normal">USDC/s</span>
                        </div>
                    </div>
                    
                    <div class="text-right">
                        <p class="text-xs text-gray-500 uppercase mb-1">AI Complexity Score</p>
                        <div id="complexityDisplay" class="text-2xl font-mono font-bold text-gray-600">IDLE</div>
                    </div>
                </div>
            </div>

            <div class="flex-1 bg-black p-5 rounded-xl border border-gray-800 font-mono text-xs overflow-y-auto relative shadow-inner flex flex-col" id="terminalBox">
                <div class="absolute -top-3 left-6 bg-black px-3 text-sm font-bold tracking-widest text-gray-500">SYSTEM LOGS</div>
                <div id="terminalLogs" class="mt-4 flex flex-col gap-1">
                    <div class="text-gray-600">> Aperture daemon v1.0.4 initialized.</div>
                    <div class="text-gray-600">> Listening to Solana Devnet events...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Скрипт для прокрутки логов вниз
        const termBox = document.getElementById('terminalBox');
        
        function logMsg(msg, color = 'text-gray-400') {
            const logs = document.getElementById('terminalLogs');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            logs.innerHTML += `<div class="${color} opacity-90 hover:opacity-100 transition-opacity"><span class="text-gray-600">[${time}]</span> > ${msg}</div>`;
            termBox.scrollTop = termBox.scrollHeight;
        }

        // Вставка тестового кода
        function setTemplate(type) {
            const input = document.getElementById('payloadInput');
            input.classList.remove('ai-scanning');
            if(type === 'light') {
                input.value = `def fetch_user_balance(user_id):\n    # Simple DB query\n    print(f"Fetching balance for {user_id}")\n    return db.get(user_id).balance\n\nfetch_user_balance("Fq3x...")`;
            } else {
                input.value = `import numpy as np\n\ndef train_neural_weights():\n    # Heavy O(n^2) matrix multiplication\n    matrix_a = np.random.rand(9999, 9999)\n    matrix_b = np.random.rand(9999, 9999)\n    \n    while True:\n        result = np.dot(matrix_a, matrix_b)\n        api.push_to_aws(result)\n\ntrain_neural_weights()`;
            }
        }

        // Отправка запроса на сервер
        async function sendRequest() {
            const code = document.getElementById('payloadInput').value;
            const btn = document.getElementById('sendBtn');
            const burnDisplay = document.getElementById('burnRateDisplay');
            const compDisplay = document.getElementById('complexityDisplay');
            const inputBox = document.getElementById('payloadInput');
            
            if(!code) return logMsg("Error: Payload cannot be empty", "text-red-500");

            // UI состояние загрузки
            btn.innerText = "STREAMING IN PROGRESS...";
            btn.classList.replace('bg-green-600', 'bg-blue-600');
            btn.classList.replace('shadow-[0_0_15px_rgba(34,197,94,0.3)]', 'shadow-[0_0_15px_rgba(59,130,246,0.5)]');
            inputBox.classList.add('ai-scanning'); // Анимация анализа
            
            logMsg("Intercepting payload...", "text-blue-400");
            logMsg("AI Agent analyzing algorithmic complexity...", "text-blue-300");

            try {
                const response = await fetch('http://127.0.0.1:8000/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_wallet: "Client", code_or_query: code })
                });

                const data = await response.json();
                inputBox.classList.remove('ai-scanning');
                
                // Цвет в зависимости от сложности
                let colorClass = data.complexity_score > 5 ? "text-red-500" : "text-yellow-400";
                
                logMsg(`Evaluation complete. Complexity Score: ${data.complexity_score}/10`, colorClass);
                logMsg(`Pushing CPI transaction to Solana Aperture Contract...`, "text-purple-400");
                
                // Обновляем спидометр и UI
                setTimeout(() => {
                    compDisplay.innerHTML = `<span class="${colorClass}">${data.complexity_score}/10</span>`;
                    burnDisplay.innerText = data.fee_per_second;
                    burnDisplay.className = colorClass;
                    logMsg(`State updated. Streaming ${data.fee_per_second} USDC/sec while executing...`, "text-green-400");
                }, 800);

                // Имитация завершения вычислений
                setTimeout(() => {
                    logMsg("Compute complete. Resetting on-chain burn rate to 0.", "text-gray-400");
                    burnDisplay.innerText = "0.00";
                    burnDisplay.className = "text-green-500";
                    compDisplay.innerHTML = `IDLE`;
                    btn.innerText = "INITIALIZE COMPUTE STREAM";
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                    btn.classList.replace('shadow-[0_0_15px_rgba(59,130,246,0.5)]', 'shadow-[0_0_15px_rgba(34,197,94,0.3)]');
                }, 4000); 

            } catch (err) {
                inputBox.classList.remove('ai-scanning');
                logMsg(`Fatal Error: Cannot connect to AI Agent. Is Python running?`, "text-red-500");
                btn.innerText = "INITIALIZE COMPUTE STREAM";
                btn.classList.replace('bg-blue-600', 'bg-green-600');
            }
        }
    </script>
</body>
</html>
